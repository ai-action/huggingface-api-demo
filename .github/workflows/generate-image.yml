name: generate-image

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Text prompt for the image (e.g. Astronaut riding a horse in space)
        required: true
        type: string
      model:
        description: Hugging Face model ID (e.g. stabilityai/stable-diffusion-xl-base-1.0)
        required: true
        type: string
      guidance_scale:
        description: Guidance scale for image generation (higher = follow prompt more closely; lower = more creative)
        required: false
        default: 8
        type: number
      seed:
        description: Random seed for reproducible generation
        required: false
        default: 42
        type: number
      cache:
        description: Use inference response caching
        required: false
        default: true
        type: boolean
      output:
        description: Output image filename (optional)
        required: false
        type: string

permissions:
  actions: write
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Generate image
        run: |
          args=(
            "$PROMPT"
            --model "$MODEL"
            --guidance-scale "$GUIDANCE_SCALE"
            --seed "$SEED"
            ${{ inputs.cache && '--cache' || '--no-cache' }}
          )
          [ -n "$OUTPUT" ] && args+=(--output "$OUTPUT")
          uv run src/main.py "${args[@]}"
        env:
          PROMPT: ${{ inputs.prompt }}
          MODEL: ${{ inputs.model }}
          GUIDANCE_SCALE: ${{ inputs.guidance_scale }}
          SEED: ${{ inputs.seed }}
          OUTPUT: ${{ inputs.output }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-image
          path: output_*.png
          if-no-files-found: error
